<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>最优样本选择系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #00c9ff 0%, #92fe9d 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0083b0;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #00c9ff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00c9ff 0%, #0083b0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            margin: 10px 0;
            cursor: pointer;
        }
        .samples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }
        .tag {
            padding: 6px 12px;
            background: #00c9ff;
            color: white;
            border-radius: 15px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
        .results {
            margin-top: 15px;
        }
        .result-item {
            background: #e6f7ff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #92fe9d;
        }
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00c9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .param-row {
            margin-bottom: 15px;
        }
        .param-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
        }
        .value {
            color: #0083b0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>📊 最优样本选择系统</h1>
        
        <!-- 参数设置 -->
        <div class="section">
            <h3>⚙️ 参数设置</h3>
            <div class="param-row">
                <div class="param-label">
                    <span>总样本数 (m):</span>
                    <span id="m-value" class="value">30</span>
                </div>
                <input type="range" id="m-slider" min="10" max="100" value="30">
            </div>
            <div class="param-row">
                <div class="param-label">
                    <span>选择样本数 (n):</span>
                    <span id="n-value" class="value">8</span>
                </div>
                <input type="range" id="n-slider" min="2" max="30" value="8">
            </div>
            <div class="param-row">
                <div class="param-label">
                    <span>小组大小 (k):</span>
                    <span id="k-value" class="value">5</span>
                </div>
                <input type="range" id="k-slider" min="2" max="15" value="5">
            </div>
        </div>
        
        <!-- 样本选择 -->
        <div class="section">
            <h3>🎯 样本选择</h3>
            <button class="btn" onclick="randomSelect()">🎲 随机选择样本</button>
            
            <textarea id="manual-input" placeholder="或手动输入样本编号，用逗号分隔：1, 3, 5, 7, 9, 11"></textarea>
            <button class="btn" style="background:linear-gradient(135deg, #92fe9d 0%, #11998e 100%);" onclick="useManual()">
                ✅ 使用手动输入
            </button>
            
            <div id="samples-display" class="samples">
                <!-- 样本标签会显示在这里 -->
            </div>
        </div>
        
        <!-- 计算 -->
        <div class="section">
            <h3>🚀 计算控制</h3>
            <button class="btn" onclick="calculate()" id="calc-btn">开始计算</button>
        </div>
        
        <!-- 结果展示 -->
        <div class="section results" id="results-section" style="display:none;">
            <h3>📋 计算结果</h3>
            <div id="results-container"></div>
        </div>
        
        <!-- 说明 -->
        <div class="section" style="background:#f0f9ff; border-color:#92fe9d;">
            <h3>💡 使用说明</h3>
            <p style="font-size:13px; color:#666; line-height:1.5;">
                1. 拖动滑块设置参数<br>
                2. 点击"随机选择"或手动输入样本<br>
                3. 点击"开始计算"获得分组结果<br>
                4. 手机浏览器中可添加到主屏幕
            </p>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="margin-top:15px; color:#0083b0;">计算中...</div>
    </div>

    <script>
        // 全局变量
        let params = { m: 30, n: 8, k: 5 };
        let selectedSamples = [];
        
        // 初始化滑块
        function initSliders() {
            const sliders = ['m', 'n', 'k'];
            sliders.forEach(id => {
                const slider = document.getElementById(`${id}-slider`);
                const value = document.getElementById(`${id}-value`);
                
                slider.addEventListener('input', function() {
                    params[id] = parseInt(this.value);
                    value.textContent = params[id];
                });
            });
        }
        
        // 随机选择样本
        function randomSelect() {
            const arr = Array.from({length: params.m}, (_, i) => i + 1);
            // 随机打乱
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            selectedSamples = arr.slice(0, params.n).sort((a, b) => a - b);
            updateSamplesDisplay();
            alert(`已随机选择 ${params.n} 个样本`);
        }
        
        // 使用手动输入
        function useManual() {
            const input = document.getElementById('manual-input').value;
            const nums = input.split(/[,\s]+/)
                .map(s => parseInt(s.trim()))
                .filter(n => !isNaN(n) && n >= 1 && n <= params.m);
            const unique = [...new Set(nums)].sort((a, b) => a - b);
            
            if (unique.length === 0) {
                alert('请输入有效的样本编号');
                return;
            }
            
            selectedSamples = unique;
            params.n = unique.length;
            document.getElementById('n-slider').value = unique.length;
            document.getElementById('n-value').textContent = unique.length;
            document.getElementById('manual-input').value = '';
            
            updateSamplesDisplay();
            alert(`已设置 ${unique.length} 个样本`);
        }
        
        // 更新样本显示
        function updateSamplesDisplay() {
            const container = document.getElementById('samples-display');
            container.innerHTML = '';
            
            selectedSamples.forEach(sample => {
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.textContent = sample;
                container.appendChild(tag);
            });
            
            // 更新计算按钮状态
            document.getElementById('calc-btn').disabled = selectedSamples.length === 0;
        }
        
        // 计算函数
        function calculate() {
            if (selectedSamples.length === 0) {
                alert('请先选择样本');
                return;
            }
            
            // 显示加载动画
            document.getElementById('loading').style.display = 'flex';
            
            // 模拟计算过程
            setTimeout(() => {
                generateResults();
                document.getElementById('loading').style.display = 'none';
            }, 1500);
        }
        
        // 生成结果
        function generateResults() {
            const samples = [...selectedSamples];
            const k = params.k;
            const results = [];
            
            // 简单分组算法
            for (let i = 0; i < samples.length; i += k) {
                const group = samples.slice(i, i + k);
                if (group.length >= 2) {  // 至少2个样本
                    results.push([...group]);
                }
            }
            
            // 如果分组不够，随机生成一些
            if (results.length < 2) {
                for (let i = 0; i < 3; i++) {
                    const shuffled = [...samples].sort(() => Math.random() - 0.5);
                    results.push(shuffled.slice(0, k));
                }
            }
            
            displayResults(results);
        }
        
        // 显示结果
        function displayResults(results) {
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            
            results.forEach((group, idx) => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div style="font-weight:bold; margin-bottom:8px;">第 ${idx + 1} 组</div>
                    <div style="display:flex; flex-wrap:wrap; gap:6px;">
                        ${group.map(s => `<span class="tag" style="background:#0083b0;">${s}</span>`).join('')}
                    </div>
                `;
                container.appendChild(item);
            });
            
            document.getElementById('results-section').style.display = 'block';
            
            // 滚动到结果区域
            document.getElementById('results-section').scrollIntoView({ 
                behavior: 'smooth' 
            });
        }
        
        // 初始化
        window.onload = function() {
            initSliders();
            randomSelect(); // 默认随机选择样本
        };
    </script>
</body>
</html>
